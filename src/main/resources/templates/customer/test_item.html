<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DINIO - Test Menu Items</title>

    <link rel="stylesheet" th:href="@{/assets/css/main.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/customer/home.css}" />
    <script th:src="@{/assets/js/header-dropdown.js}"></script>
    <script th:src="@{/assets/js/customer/dish-detail-modal.js}"></script>
    <script th:src="@{/assets/js/customer/check-reservation-modal.js}"></script>
    <!-- Thêm JS pagination -->
    <script th:src="@{/assets/js/customer/test-items-pagination.js}"></script>
  </head>

  <body>
    <div th:replace="fragments/header :: header"></div>
    <div th:replace="~{fragments/dish-detail-modal :: dishDetailModal}"></div>
    <div
      th:replace="~{fragments/check-reservation-modal :: checkReservationModal}"
    ></div>

    <main class="container">
      <!-- Món Yêu Thích từ Database -->
      <section id="best-seller" class="section" style="margin-top: 40px">
        <div class="section-head">
          <div>
            <p class="section-eyebrow">Signature selection</p>
            <h3 class="section-title">Món được yêu thích</h3>
            <p class="section-subtitle">
              Những món được yêu thích nhất tại Dinio — tinh gọn, tinh tế và đậm
              dấu ấn.
            </p>
          </div>
          <a href="/dinio/menu" class="btn btn-cta">Thực đơn</a>
        </div>

        <!-- Hiển thị lỗi nếu có -->
        <div
          th:if="${error}"
          style="
            background: #fee;
            border: 1px solid #fcc;
            border-radius: 12px;
            padding: 20px;
            color: #c33;
            margin-bottom: 24px;
          "
        >
          <strong>⚠️ Lỗi:</strong>
          <p th:text="${error}" style="margin: 8px 0 0 0"></p>
        </div>

        <!-- Grid món yêu thích -->
        <div
          class="best-grid"
          th:if="${favoriteItems != null and !favoriteItems.isEmpty()}"
        >
          <div th:each="item : ${favoriteItems}">
            <div
              th:with="badge=${item.itemTags != null and !item.itemTags.isEmpty() ? item.itemTags.iterator().next().toString() : 'Special'},
                         price=${#numbers.formatDecimal(item.basePrice, 1, 0) + 'đ'},
                         img=${item.imageUrl != null and item.imageUrl != '' ? item.imageUrl : 'assets/pic/menu/default.jpg'}"
            >
              <div
                th:replace="fragments/dish-card :: dishCard(${item.name}, ${item.description}, ${price}, ${img}, ${badge})"
              ></div>
            </div>
          </div>
        </div>

        <!-- Empty state -->
        <div
          th:unless="${favoriteItems != null and !favoriteItems.isEmpty()}"
          style="
            text-align: center;
            padding: 60px 20px;
            background: var(--surface-1);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
          "
        >
          <div style="font-size: 64px; margin-bottom: 16px; opacity: 0.3">
            📭
          </div>
          <p style="font-size: 16px; color: var(--text-muted)">
            Chưa có món yêu thích nào trong database
          </p>
        </div>

        <!-- Pagination sẽ được tạo động bởi JS -->
      </section>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
  </body>
</html>
